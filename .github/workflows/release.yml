name: Build and Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build App
      # Erstellt eine portable Release-Version im Ordner 'publish'
      run: dotnet publish WiimmfiScraper/WiimmfiScraper.vbproj -c Release -r win-x64 --self-contained false -o ./publish

    - name: Zip Release
      run: Compress-Archive -Path ./publish/* -DestinationPath WiimmfiScraper-Windows-x64.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "Release v1.0.${{ github.run_number }}"
        files: WiimmfiScraper-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
